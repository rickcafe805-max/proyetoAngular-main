<div class="pagina">
  <div class="logo-area">
       <img src="/iconos/logoMejorAnalisis.png" class="logo-img" alt="Logo">
      <span class="logo-texto">Web-hito</span>
    </div>

  <div class="contenedorAmarillo">
    <div class="encabezado">
      <div class="paso-badge">Paso 4 de 4</div>
      <h1>Aprende a usar la app</h1>
    </div>

    <div class="slides-indicador">
      <div class="punto" *ngFor="let s of slides; let i = index"
        [class.activo]="slideActual === i"
        (click)="slideActual = i">
      </div>
    </div>

    <div class="slide-contenido">
      <div class="slide-icono">{{ slides[slideActual].icono }}</div>
      <h2>{{ slides[slideActual].titulo }}</h2>
      <p class="slide-descripcion">{{ slides[slideActual].descripcion }}</p>
      <ul class="slide-lista">
        <li *ngFor="let item of slides[slideActual].items; let i = index">
          <span class="numero">{{ i + 1 }}</span>
          {{ item }}
        </li>
      </ul>
    </div>
  </div>

<!-- Justo antes de .botones-nav -->
<p class="error-registro" *ngIf="error">{{ error }}</p>
<p class="cargando-registro" *ngIf="cargando">Creando tu cuenta...</p>

<div class="botones-nav">
  <button class="btn-nav" routerLink="/cuestionario3">Anterior</button>
  <a class="link-saltar" (click)="registrar()">Saltar tutorial</a>
  <button class="btn-nav btn-continuar" (click)="siguiente()">
    {{ slideActual === slides.length - 1 ? '¡Comenzar!' : 'Continuar' }}
  </button>
</div>

<p class="error-registro" *ngIf="error">{{ error }}</p>
<p class="cargando-registro" *ngIf="cargando">Creando tu cuenta... ⏳</p>
</div>
